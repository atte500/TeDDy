name: Remote Debug Probe

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for the probe'
        required: false
        default: 'Manual diagnostic probe'

jobs:
  probe:
    name: Probe (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - name: Check out repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Load cached venv
      id: cached-uv-dependencies
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-3.14-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --frozen

    - name: Execute Remote Probe
      run: |
        echo "::group::Probe Metadata"
        echo "OS: ${{ runner.os }}"
        echo "Reason: ${{ github.event.inputs.reason }}"
        echo "::endgroup::"

        if [ -f spikes/debug/remote_probe.sh ]; then
          bash spikes/debug/remote_probe.sh
        else
          echo "[ERROR] spikes/debug/remote_probe.sh not found."
          exit 1
        fi
