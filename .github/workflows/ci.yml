name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-suite:
    name: Test Suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - name: Check out repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Load cached venv
      id: cached-uv-dependencies
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-3.14-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --frozen

    - name: Install clipboard backend (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xclip

    - name: Run Tests
      run: uv run pytest

  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - name: Check out repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Set up Node.js (for jscpd)
      uses: actions/setup-node@v5
      with:
        node-version: "24"

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Load cached venv
      id: cached-uv-dependencies
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-quality-${{ runner.os }}-3.14-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --frozen

    - name: Run Pre-commit Hooks
      # We skip 'run-tests' as it is handled by the test-suite job
      run: |
        SKIP=run-tests uv run pre-commit run --all-files

    - name: Verify Test Pyramid
      run: |
        uv run python scripts/verify_test_pyramid.py

    - name: Check Python File Length (Max 300 Lines)
      run: |
        find src tests -name "*.py" | xargs wc -l | awk '$1 > 300 && $2 != "total" {print "File " $2 " is too long (" $1 " lines)."; exit 1}'

    - name: Detect Code Duplication
      run: |
        npx jscpd --min-tokens 25 --threshold 0 --ignore "**/.venv/**,**/ports/**,**/prompts/**,**/spikes/**"
