name: Debug Spike Runner

on:
  workflow_dispatch:

jobs:
  run-spike:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        # Use PowerShell for multi-line commands on Windows runners
        shell: pwsh
        run: |
          pip install poetry

      - name: Install dependencies
        shell: pwsh
        run: |
          poetry install

      - name: Create verification spike script
        shell: pwsh
        run: |
          $scriptContent = @"
          import subprocess
          import sys

          def run_test(name, command_to_test, expected_code):
              """Runs a command and compares its exit code against an expected value."""
              print(f"[TEST: {name}]")
              print(f"  Executing command:\n  {command_to_test}\n")

              if sys.platform != "win32":
                  print("  VERDICT: SKIPPED (This verification spike must be run on a Windows machine.)")
                  print("---------------------------------")
                  return

              try:
                  # On Windows, shell=True uses cmd.exe. We don't use check=True
                  # because we want to inspect the return code of failing commands.
                  result = subprocess.run(
                      command_to_test,
                      shell=True,
                      capture_output=True,
                      text=True,
                      check=False,
                  )
                  actual_code = result.returncode

                  # Using repr() to make whitespace and newlines visible
                  print(f"  STDOUT: {repr(result.stdout)}")
                  print(f"  STDERR: {repr(result.stderr)}")
                  print(f"  Exit Code: {actual_code}")

                  if actual_code == expected_code:
                      print(f"  VERDICT: PASS - Exit code was {actual_code} as expected.")
                  else:
                      print(f"  VERDICT: FAIL - Exit code was {actual_code}, but expected {expected_code}. This may confirm the bug.")

              except Exception as e:
                  print(f"  ERROR: An exception occurred: {e}")
                  print(f"  VERDICT: ERROR")
              print("---------------------------------")


          if __name__ == "__main__":
              print("----- Windows Exit Code Verification Spike -----")
              print(f"Running on platform: {sys.platform}\n")

              # This is the failing python command from the unit/acceptance tests.
              py_command_fail = f'{sys.executable} -c "import sys; sys.exit(1)"'

              # Test 1: Mimics the adapter's wrapper for a single failing line that contains double quotes.
              # The adapter generates: {line} || cmd /c "echo FAILED... & exit 1"
              cmd1 = f'{py_command_fail} || cmd /c "echo FAILED_COMMAND >&2 & exit 1"'
              run_test(
                  name="Quoted Command Wrapper",
                  command_to_test=cmd1,
                  expected_code=1
              )

              # Test 2: Mimics the adapter's wrapper for a failing built-in command.
              cmd2 = 'exit /b 2 || cmd /c "echo FAILED_COMMAND >&2 & exit 1"'
              run_test(
                  name="Shell Built-in Wrapper",
                  command_to_test=cmd2,
                  expected_code=1
              )

              # Test 3: Mimics the full multi-line command generated by the adapter in the failing tests.
              py_command_ok = f'{sys.executable} -c "print(\'line1\')"'
              line1_wrapped = f'{py_command_ok} || cmd /c "echo FAILED_line1 >&2 & exit 1"'
              line2_wrapped = f'{py_command_fail} || cmd /c "echo FAILED_line2 >&2 & exit 1"'
              line3_wrapped = f'{py_command_ok.replace("line1", "line3")} || cmd /c "echo FAILED_line3 >&2 & exit 1"'
              cmd3 = f"{line1_wrapped} && {line2_wrapped} && {line3_wrapped}"
              run_test(
                  name="Multi-line Simulation (Failing Middle Command)",
                  command_to_test=cmd3,
                  expected_code=1
              )

              print("\n----- Verifying Proposed Solution (Parenthesis Grouping) -----")

              # Test 4: Proposed fix for a single line.
              cmd4 = f"({py_command_fail} || cmd /c \"echo FAILED_COMMAND >&2 & exit 1\")"
              run_test(
                  name="[FIX] Quoted Command with Parentheses",
                  command_to_test=cmd4,
                  expected_code=1
              )

              # Test 5: Proposed fix for the full multi-line command.
              line1_fixed = f"({py_command_ok} || cmd /c \"echo FAILED_line1 >&2 & exit 1\")"
              line2_fixed = f"({py_command_fail} || cmd /c \"echo FAILED_line2 >&2 & exit 1\")"
              line3_fixed = f"({py_command_ok.replace('line1', 'line3')} || cmd /c \"echo FAILED_line3 >&2 & exit 1\")"
              cmd5 = f"{line1_fixed} && {line2_fixed} && {line3_fixed}"
              run_test(
                  name="[FIX] Multi-line Simulation with Parentheses",
                  command_to_test=cmd5,
                  expected_code=1
              )

              print("----- Spike Complete -----")
          "@
          New-Item -Path . -Name "verify_windows_subprocess.py" -ItemType "file" -Value $scriptContent

      - name: Run verification spike
        shell: pwsh
        run: |
          poetry run python verify_windows_subprocess.py
