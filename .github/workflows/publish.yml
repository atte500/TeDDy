name: Publish to PyPI and Test PyPI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-to-testpypi:
    name: Publish to Test PyPI
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/teddy-cli
    permissions:
      id-token: write  # MANDATORY: This permission is required for OIDC Trusted Publishing
    steps:
    - name: Checkout source
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Generate Dynamic Dev Version
      run: |
        # Bump patch version and append .dev<run_number> for PEP 440 compliance
        CURRENT_VERSION=$(uv run python -c "import tomllib; f=open('pyproject.toml','rb'); print(tomllib.load(f)['project']['version'])")
        NEXT_VERSION=$(echo "$CURRENT_VERSION" | awk -F. '{OFS=FS; $NF=$NF+1; print}')
        sed -i "s/^version = \".*\"/version = \"${NEXT_VERSION}.dev${{ github.run_number }}\"/" pyproject.toml

    - name: Build package
      run: uv build

    - name: Publish to Test PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/teddy-cli
    permissions:
      id-token: write  # MANDATORY: This permission is required for OIDC Trusted Publishing
    steps:
    - name: Checkout source
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Build package
      run: uv build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
