name: Publish to PyPI and Test PyPI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-to-testpypi:
    name: Publish to Test PyPI
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/teddy-cli
    permissions:
      id-token: write  # MANDATORY: This permission is required for OIDC Trusted Publishing
    steps:
    - name: Checkout source
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.8.3

    - name: Generate Dynamic Dev Version
      run: |
        # Append the GitHub Run Number as a development version suffix (.dev<num>)
        CURRENT_VERSION=$(poetry version -s)
        poetry version "${CURRENT_VERSION}.dev${{ github.run_number }}"

    - name: Build package
      run: poetry build

    - name: Publish to Test PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/teddy-cli
    permissions:
      id-token: write  # MANDATORY: This permission is required for OIDC Trusted Publishing
    steps:
    - name: Checkout source
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.8.3

    - name: Build package
      run: poetry build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
