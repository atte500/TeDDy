name: Publish to PyPI and Test PyPI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-to-testpypi:
    name: Publish to Test PyPI
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/teddy-cli
    permissions:
      id-token: write  # MANDATORY: This permission is required for OIDC Trusted Publishing
    steps:
    - name: Checkout source
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Generate Dynamic Dev Version
      run: |
        # Bump patch version and append .dev<run_number> for PEP 440 compliance
        CURRENT_VERSION=$(uv run python -c "import tomllib; f=open('pyproject.toml','rb'); print(tomllib.load(f)['project']['version'])")
        NEXT_VERSION=$(echo "$CURRENT_VERSION" | awk -F. '{OFS=FS; $NF=$NF+1; print}')
        sed -i "s/^version = \".*\"/version = \"${NEXT_VERSION}.dev${{ github.run_number }}\"/" pyproject.toml

    - name: Build package
      run: uv build

    - name: Publish to Test PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/teddy-cli
    permissions:
      id-token: write  # MANDATORY: This permission is required for OIDC Trusted Publishing
      actions: read  # Required to check CI workflow run status before publishing
    steps:
    - name: Wait for CI to pass
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Checking CI status for commit ${{ github.sha }}..."
        for i in $(seq 1 60); do
          RUN=$(gh run list --commit "${{ github.sha }}" --workflow CI --json conclusion,status --limit 1)
          CONCLUSION=$(echo "$RUN" | jq -r '.[0].conclusion // "null"')
          STATUS=$(echo "$RUN" | jq -r '.[0].status // "null"')

          if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" = "success" ]; then
            echo "CI passed! Proceeding with publish."
            exit 0
          elif [ "$STATUS" = "completed" ] && [ "$CONCLUSION" != "success" ]; then
            echo "CI failed with conclusion: $CONCLUSION"
            exit 1
          fi

          echo "Waiting for CI to complete... (attempt $i/60, status=$STATUS, conclusion=$CONCLUSION)"
          sleep 10
        done
        echo "Timed out waiting for CI after 10 minutes"
        exit 1

    - name: Checkout source
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Build package
      run: uv build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
