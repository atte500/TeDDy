repos:
-   repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
    -   id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: 'poetry\.lock|\.secrets\.baseline'

-   repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
    -   id: bandit
        args: ["-c", "pyproject.toml"]
        # Exclude tests from bandit checks as they might contain test data that looks like secrets
        exclude: ^tests/

-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-toml
    -   id: check-added-large-files
        args: ['--maxkb=500']
    -   id: check-case-conflict
    -   id: check-merge-conflict

-   repo: local
    hooks:
    -   id: ruff-lint
        name: Ruff Linter
        entry: poetry run ruff check --fix --force-exclude
        language: system
        types: [python]
        require_serial: true

    -   id: ruff-format
        name: Ruff Formatter
        entry: poetry run ruff format --force-exclude
        language: system
        types: [python]
        require_serial: true

    -   id: mypy
        name: Mypy
        entry: poetry run mypy
        language: system
        types: [python]
        require_serial: true

    -   id: vulture
        name: Vulture (Dead Code)
        entry: poetry run vulture --min-confidence 80
        language: system
        types: [python]

    -   id: file-length-python
        name: Check Python File Length (Max 300 Lines)
        entry: bash -c 'for f in "$@"; do len=$(wc -l < "$f" | xargs); if [ $len -gt 300 ]; then echo "File $f is too long ($len lines). Please refactor to keep it under 300 lines."; exit 1; fi; done' --
        language: system
        types: [python]
        files: ^(src|tests)/

    -   id: clean-spikes
        name: Clean Spikes Directory
        entry: bash -c 'rm -rf spikes/*'
        language: system
        always_run: true
        pass_filenames: false

    -   id: pip-audit
        name: Vulnerability Scanning (pip-audit)
        entry: poetry run pip-audit
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|poetry\.lock)$
