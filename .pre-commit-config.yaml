exclude: '^spikes/'
repos:
-   repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
    -   id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: 'poetry\.lock|\.secrets\.baseline'

-   repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
    -   id: bandit
        args: ["-c", "pyproject.toml"]
        # Exclude tests and experimental code from bandit checks
        exclude: ^(tests|spikes)/

-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
        exclude: ^spikes/
    -   id: end-of-file-fixer
        exclude: ^spikes/
    -   id: check-toml
    -   id: check-added-large-files
        args: ['--maxkb=500']
        exclude: ^spikes/
    -   id: check-case-conflict
        exclude: ^spikes/
    -   id: check-merge-conflict
        exclude: ^spikes/

-   repo: local
    hooks:
    -   id: ruff-lint
        name: Ruff Linter
        entry: poetry run ruff check --fix --force-exclude
        language: system
        types: [python]
        require_serial: true

    -   id: ruff-format
        name: Ruff Formatter
        entry: poetry run ruff format --force-exclude
        language: system
        types: [python]
        require_serial: true

    -   id: mypy
        name: Mypy
        entry: poetry run mypy
        language: system
        types: [python]
        require_serial: true


    -   id: pip-audit
        name: Vulnerability Scanning (pip-audit)
        entry: poetry run pip-audit --ignore-vuln PYSEC-2026-196
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|poetry\.lock)$

    -   id: check-core-di-boundary
        name: Check Core DI Boundary (No punq in core)
        entry: |
          bash -c 'for f in "$@"; do
            if grep -qE "import punq|from punq" "$f"; then
              echo "DI Boundary Violation: punq imported in core service ($f). Core logic must not depend on DI framework."
              exit 1
            fi
          done' --
        language: system
        types: [python]
        files: ^src/teddy_executor/core/

    -   id: check-explicit-utf8
        name: Enforce Explicit UTF-8 Encoding (Production)
        entry: |
          bash -c 'for f in "$@"; do
            # Scan for read_text, write_text, or open(..., "w"/"r") missing encoding="utf-8"
            # Excludes binary modes (rb/wb) and existing correct usages.
            if grep -qE "(read_text|write_text)\(\)" "$f" || \
               grep -qE "open\(.*, *[\"'"'"'][rw][^\"'"'"'b]*[\"'"'"']\)" "$f" | grep -qv "encoding="; then
              echo "UTF-8 Compliance Violation: Missing explicit encoding=\"utf-8\" in $f"
              exit 1
            fi
          done' --
        language: system
        types: [python]
        files: ^src/

    -   id: post-commit-test-gate
        name: Post-commit test gate
        entry: poetry run python .githooks/post-commit.py
        language: system
        stages: [post-commit]
        always_run: true
        pass_filenames: false
